<!doctype html>
<meta charset="utf-8">
<title>Cosmic Conquest Atlas v0.5.0 Smoke Test</title>
<h1>Cosmic Conquest Atlas v0.5.0 Smoke Test</h1>
<script>
Promise.all([
  fetch('js/app.js').then(r => r.text()),
  fetch('js/logistics.js').then(r => r.text()),
  fetch('css/styles.css').then(r => r.text()),
  fetch('index.html').then(r => r.text())
]).then(([app, logistics, css, html]) => {
  const tests = [
    ['Revert Last Save preserved', app.includes('revertLastUserSave') && html.includes('revertLastSaveBtn')],
    ['System moon texture thumbnails', app.includes('customTextureSource(body)') && app.includes('systemOnly: true')],
    ['Cached system body sprites', app.includes('systemBodySpriteCache') && app.includes('buildSystemBodySprite')],
    ['Cached asteroid layer', app.includes('asteroidBeltLayer') && app.includes('systemOrbitLayerCache')],
    ['WebGL globe acceleration', app.includes('renderGlobeWithWebGL') && app.includes('createGlobeRenderer')],
    ['Hidden Logistics rendering skipped', logistics.includes('getActiveView') && logistics.includes('state.renderDirty = true')],
    ['Live backdrop blur disabled', css.includes('backdrop-filter: none')]
  ];
  for (const [name, pass] of tests) {
    document.body.insertAdjacentHTML('beforeend', `<p>${name}: ${pass ? 'PASS' : 'FAIL'}</p>`);
  }
}).catch(error => {
  document.body.insertAdjacentHTML('beforeend', `<p>Smoke test error: ${String(error)}</p>`);
});
</script>
