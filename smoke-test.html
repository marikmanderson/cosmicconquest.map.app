<!doctype html>

<title>Cosmic Conquest Atlas v0.4.7 Smoke Test</title>
<h1>Cosmic Conquest Atlas v0.4.7 Smoke Test</h1>
<script>
fetch('js/app.js').then(r=>r.text()).then(t=>{
  document.body.insertAdjacentHTML('beforeend', '<p>Star editor: ' + (/\["star", "planet", "moon", "station", "asteroid_belt"\]/.test(t) ? 'PASS' : 'FAIL') + '</p>');

});
